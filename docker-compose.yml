services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./storage:/var/www/storage
    networks:
      - network-ujikom
    depends_on:
      - db
    scale: 3

  nginx:
    image: nginx:alpine
    container_name: ujikom_nginx
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - network-ujikom
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: ujikom_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mysql
      MYSQL_ROOT_PASSWORD:
      MYSQL_PASSWORD:
      MYSQL_USER: project-hotelsa
    volumes:
      - volume-ujikom:/var/lib/mysql
    ports:
      - '3306:3306'
    networks:
      - network-ujikom

networks:
  network-ujikom:
    driver: bridge

volumes:
  volume-ujikom:
    driver: local
